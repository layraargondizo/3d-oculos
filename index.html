<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Óculos Virtual - Câmera</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>
  body {
    text-align: center;
    background: #000;
  }

  video, canvas {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    max-width: 100%;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// óculos
const glassesImg = new Image();
glassesImg.src = "https://images.tcdn.com.br/img/editor/up/1360466/teste_oculos3.png";

// ativar câmera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
});

video.onloadedmetadata = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
};

// MediaPipe
const faceMesh = new FaceMesh({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
  }
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true
});

faceMesh.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks.length > 0) {
    const landmarks = results.multiFaceLandmarks[0];

    const leftEye = landmarks[33];
    const rightEye = landmarks[263];

    const x1 = leftEye.x * canvas.width;
    const y1 = leftEye.y * canvas.height;
    const x2 = rightEye.x * canvas.width;
    const y2 = rightEye.y * canvas.height;

    const distance = Math.hypot(x2 - x1, y2 - y1);

    const glassesWidth = distance * 2.3;
    const aspectRatio = glassesImg.height / glassesImg.width;
    const glassesHeight = glassesWidth * aspectRatio;

    const centerX = (x1 + x2) / 2;
    const centerY = (y1 + y2) / 2;

    const angle = Math.atan2(y2 - y1, x2 - x1);

    const offsetY = distance * 0.1;

    ctx.save();

    ctx.translate(centerX, centerY + offsetY);
    ctx.rotate(angle);

    ctx.drawImage(
      glassesImg,
      -glassesWidth / 2,
      -glassesHeight / 2,
      glassesWidth,
      glassesHeight
    );

    ctx.restore();
  }
});

// loop
async function render() {
  await faceMesh.send({ image: video });
  requestAnimationFrame(render);
}

render();

</script>

</body>
</html>
